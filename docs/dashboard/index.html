<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard | RobotBlackBox</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>⬛</text></svg>">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: system-ui, -apple-system, sans-serif; background: #0a0a0a; color: #e5e5e5; min-height: 100vh; }
        
        .header { display: flex; justify-content: space-between; align-items: center; padding: 16px; border-bottom: 1px solid #262626; flex-wrap: wrap; gap: 12px; }
        .logo { font-size: 1.4rem; font-weight: bold; color: #22c55e; }
        .controls { display: flex; align-items: center; gap: 12px; flex-wrap: wrap; }
        .badge { padding: 4px 12px; border-radius: 4px; font-size: 12px; font-weight: 500; }
        .badge-demo { background: #1e3a5f; color: #60a5fa; }
        .badge-live { background: #14532d; color: #22c55e; }
        .badge-off { background: #450a0a; color: #ef4444; }
        .btn { padding: 6px 14px; border-radius: 4px; border: none; cursor: pointer; font-size: 13px; transition: all 0.2s; }
        .btn-active { background: #22c55e; color: #000; }
        .btn-inactive { background: #27272a; color: #a1a1aa; }
        .btn-inactive:hover { background: #3f3f46; }
        .back-link { color: #71717a; font-size: 13px; text-decoration: none; margin-left: 16px; }
        .back-link:hover { color: #a1a1aa; }
        
        .grid { display: grid; grid-template-columns: 2fr 1fr; gap: 16px; padding: 16px; }
        @media (max-width: 900px) { .grid { grid-template-columns: 1fr; } }
        
        .card { background: #18181b; border: 1px solid #27272a; border-radius: 8px; padding: 16px; }
        .card-title { font-size: 12px; color: #71717a; margin-bottom: 12px; text-transform: uppercase; letter-spacing: 0.5px; }
        
        .chart-container { position: relative; height: 200px; }
        #chart { width: 100%; height: 100%; }
        
        .failures { max-height: 250px; overflow-y: auto; }
        .failure-item { border-left: 3px solid; padding: 8px 0 8px 12px; margin-bottom: 12px; }
        .failure-item.critical { border-color: #ef4444; }
        .failure-item.high { border-color: #f97316; }
        .failure-item.medium { border-color: #eab308; }
        .failure-type { font-size: 10px; padding: 2px 6px; border-radius: 3px; color: #fff; display: inline-block; margin-bottom: 4px; }
        .failure-type.sensor { background: #991b1b; }
        .failure-type.motor { background: #92400e; }
        .failure-type.model { background: #854d0e; }
        .failure-summary { color: #d4d4d4; font-size: 13px; }
        .failure-time { color: #525252; font-size: 11px; margin-top: 4px; }
        .no-data { color: #525252; font-size: 13px; }
        
        .sessions { max-height: 180px; overflow-y: auto; }
        .session-item { padding: 8px 12px; background: #27272a; border-radius: 4px; margin-bottom: 6px; cursor: pointer; font-size: 13px; transition: background 0.2s; }
        .session-item:hover { background: #3f3f46; }
        .session-failures { color: #ef4444; margin-left: 8px; }
        
        .replay-controls { display: flex; align-items: center; gap: 12px; margin-bottom: 16px; }
        .replay-controls button { padding: 6px 16px; background: #27272a; border: none; border-radius: 4px; color: #e5e5e5; cursor: pointer; }
        .replay-controls button:hover { background: #3f3f46; }
        .replay-controls input[type="range"] { flex: 1; max-width: 200px; }
        .replay-stats { display: grid; grid-template-columns: repeat(3, 1fr); gap: 16px; }
        .stat-label { color: #71717a; font-size: 12px; margin-bottom: 4px; }
        .stat-value { font-size: 14px; }
        .stat-value.good { color: #22c55e; }
        .stat-value.bad { color: #ef4444; }
        
        .full-width { grid-column: 1 / -1; }
    </style>
</head>
<body>
    <header class="header">
        <div style="display: flex; align-items: center;">
            <span class="logo">⬛ RobotBlackBox</span>
            <a href="../" class="back-link">← Back to home</a>
        </div>
        <div class="controls">
            <button id="btn-demo" class="btn btn-active" onclick="switchMode('demo')">Demo</button>
            <button id="btn-live" class="btn btn-inactive" onclick="switchMode('live')">Live</button>
            <span id="status" class="badge badge-demo">DEMO</span>
        </div>
    </header>
    
    <div class="grid">
        <div class="card">
            <div class="card-title">Model Confidence (Live)</div>
            <div class="chart-container">
                <canvas id="chart"></canvas>
            </div>
        </div>
        
        <div class="card">
            <div class="card-title">Failure Alerts</div>
            <div id="failures" class="failures">
                <p class="no-data">No failures detected</p>
            </div>
        </div>
        
        <div class="card">
            <div class="card-title">Sessions</div>
            <div id="sessions" class="sessions">
                <div class="session-item" onclick="loadReplay('demo-1')">Today 10:30 AM <span class="session-failures">(3 failures)</span></div>
                <div class="session-item" onclick="loadReplay('demo-2')">Today 08:15 AM <span class="session-failures">(1 failure)</span></div>
                <div class="session-item" onclick="loadReplay('demo-3')">Yesterday 04:45 PM <span class="session-failures">(7 failures)</span></div>
            </div>
        </div>
        
        <div class="card">
            <div class="card-title">Session Replay</div>
            <div id="replay-container">
                <div id="replay-controls" class="replay-controls" style="display: none;">
                    <button id="replay-btn" onclick="toggleReplay()">Play</button>
                    <input type="range" id="replay-slider" min="0" max="99" value="0" oninput="seekReplay(this.value)">
                    <span id="replay-progress">1/100</span>
                </div>
                <div id="replay-stats" class="replay-stats" style="display: none;">
                    <div><div class="stat-label">Time</div><div id="stat-time" class="stat-value">--</div></div>
                    <div><div class="stat-label">Confidence</div><div id="stat-conf" class="stat-value">--</div></div>
                    <div><div class="stat-label">Phase</div><div id="stat-phase" class="stat-value">--</div></div>
                </div>
                <p id="replay-empty" class="no-data">Select a session to replay</p>
            </div>
        </div>
    </div>
    
    <script>
        // State
        let mode = 'demo';
        let telemetryData = [];
        let failures = [];
        let replayData = [];
        let replayIndex = 0;
        let isReplaying = false;
        let demoInterval = null;
        let replayInterval = null;
        let chartCtx = null;
        
        // Initialize
        document.addEventListener('DOMContentLoaded', () => {
            chartCtx = document.getElementById('chart').getContext('2d');
            resizeChart();
            window.addEventListener('resize', resizeChart);
            startDemo();
        });
        
        function resizeChart() {
            const canvas = document.getElementById('chart');
            const container = canvas.parentElement;
            canvas.width = container.clientWidth;
            canvas.height = container.clientHeight;
            drawChart();
        }
        
        function switchMode(newMode) {
            mode = newMode;
            document.getElementById('btn-demo').className = mode === 'demo' ? 'btn btn-active' : 'btn btn-inactive';
            document.getElementById('btn-live').className = mode === 'live' ? 'btn btn-active' : 'btn btn-inactive';
            document.getElementById('status').className = mode === 'demo' ? 'badge badge-demo' : 'badge badge-off';
            document.getElementById('status').textContent = mode === 'demo' ? 'DEMO' : 'DISCONNECTED';
            
            if (mode === 'demo') {
                startDemo();
            } else {
                stopDemo();
                telemetryData = [];
                failures = [];
                drawChart();
                renderFailures();
            }
        }
        
        function startDemo() {
            if (demoInterval) return;
            demoInterval = setInterval(() => {
                const now = Date.now();
                const confidence = 0.7 + Math.random() * 0.25 + Math.sin(now / 5000) * 0.1;
                telemetryData.push({ time: now, confidence: Math.min(1, Math.max(0, confidence)) });
                if (telemetryData.length > 100) telemetryData.shift();
                
                // Random failures
                if (Math.random() < 0.02) {
                    const types = [
                        { type: 'sensor', severity: 'high', summary: 'Sensor dropout on joint 3' },
                        { type: 'motor', severity: 'high', summary: 'Motor overload on joint 5' },
                        { type: 'model', severity: 'medium', summary: 'AI confidence dropped to 38%' },
                        { type: 'model', severity: 'critical', summary: 'AI critically uncertain (22%)' },
                    ];
                    const f = types[Math.floor(Math.random() * types.length)];
                    failures.unshift({ ...f, time: now });
                    if (failures.length > 20) failures.pop();
                    renderFailures();
                }
                
                drawChart();
            }, 200);
        }
        
        function stopDemo() {
            if (demoInterval) {
                clearInterval(demoInterval);
                demoInterval = null;
            }
        }
        
        function drawChart() {
            const canvas = document.getElementById('chart');
            const ctx = chartCtx;
            const w = canvas.width;
            const h = canvas.height;
            
            ctx.fillStyle = '#18181b';
            ctx.fillRect(0, 0, w, h);
            
            // Grid lines
            ctx.strokeStyle = '#27272a';
            ctx.lineWidth = 1;
            for (let i = 0; i <= 4; i++) {
                const y = h - (i / 4) * h;
                ctx.beginPath();
                ctx.moveTo(0, y);
                ctx.lineTo(w, y);
                ctx.stroke();
                
                ctx.fillStyle = '#525252';
                ctx.font = '10px system-ui';
                ctx.fillText((i * 25) + '%', 4, y - 4);
            }
            
            if (telemetryData.length < 2) return;
            
            // Draw line
            ctx.strokeStyle = '#22c55e';
            ctx.lineWidth = 2;
            ctx.beginPath();
            
            const step = w / (telemetryData.length - 1);
            telemetryData.forEach((d, i) => {
                const x = i * step;
                const y = h - (d.confidence * h);
                if (i === 0) ctx.moveTo(x, y);
                else ctx.lineTo(x, y);
            });
            ctx.stroke();
            
            // Glow effect
            ctx.strokeStyle = 'rgba(34, 197, 94, 0.3)';
            ctx.lineWidth = 6;
            ctx.beginPath();
            telemetryData.forEach((d, i) => {
                const x = i * step;
                const y = h - (d.confidence * h);
                if (i === 0) ctx.moveTo(x, y);
                else ctx.lineTo(x, y);
            });
            ctx.stroke();
        }
        
        function renderFailures() {
            const container = document.getElementById('failures');
            if (failures.length === 0) {
                container.innerHTML = '<p class="no-data">No failures detected</p>';
                return;
            }
            container.innerHTML = failures.map(f => `
                <div class="failure-item ${f.severity}">
                    <span class="failure-type ${f.type}">${f.type}</span>
                    <div class="failure-summary">${f.summary}</div>
                    <div class="failure-time">${new Date(f.time).toLocaleTimeString()}</div>
                </div>
            `).join('');
        }
        
        function loadReplay(sessionId) {
            // Generate mock replay data
            replayData = [];
            const phases = ['reaching', 'grasping', 'lifting', 'placing'];
            for (let i = 0; i < 100; i++) {
                replayData.push({
                    time: Date.now() - (100 - i) * 1000,
                    confidence: 0.6 + Math.random() * 0.35,
                    phase: phases[i % 4],
                });
            }
            replayIndex = 0;
            isReplaying = false;
            
            document.getElementById('replay-empty').style.display = 'none';
            document.getElementById('replay-controls').style.display = 'flex';
            document.getElementById('replay-stats').style.display = 'grid';
            document.getElementById('replay-slider').max = replayData.length - 1;
            
            updateReplayDisplay();
        }
        
        function toggleReplay() {
            isReplaying = !isReplaying;
            document.getElementById('replay-btn').textContent = isReplaying ? 'Pause' : 'Play';
            
            if (isReplaying) {
                replayInterval = setInterval(() => {
                    replayIndex++;
                    if (replayIndex >= replayData.length) {
                        replayIndex = replayData.length - 1;
                        isReplaying = false;
                        document.getElementById('replay-btn').textContent = 'Play';
                        clearInterval(replayInterval);
                    }
                    updateReplayDisplay();
                }, 100);
            } else if (replayInterval) {
                clearInterval(replayInterval);
            }
        }
        
        function seekReplay(value) {
            replayIndex = parseInt(value);
            isReplaying = false;
            document.getElementById('replay-btn').textContent = 'Play';
            if (replayInterval) clearInterval(replayInterval);
            updateReplayDisplay();
        }
        
        function updateReplayDisplay() {
            const d = replayData[replayIndex];
            if (!d) return;
            
            document.getElementById('replay-slider').value = replayIndex;
            document.getElementById('replay-progress').textContent = `${replayIndex + 1}/${replayData.length}`;
            document.getElementById('stat-time').textContent = new Date(d.time).toLocaleTimeString();
            
            const confEl = document.getElementById('stat-conf');
            confEl.textContent = (d.confidence * 100).toFixed(1) + '%';
            confEl.className = d.confidence < 0.5 ? 'stat-value bad' : 'stat-value good';
            
            document.getElementById('stat-phase').textContent = d.phase;
        }
    </script>
</body>
</html>
